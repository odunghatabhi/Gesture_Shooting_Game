name: Build Windows EXE

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --clean --onedir --noconsole game.py `
        --collect-data mediapipe `
        --collect-binaries mediapipe `
        --hidden-import mediapipe.python.solutions.hands `
        --hidden-import mediapipe.python.solutions.drawing_utils `
        --hidden-import mediapipe.python.solutions.drawing_styles

    - name: Zip build
      run: |
        Compress-Archive -Path dist/game/* -DestinationPath gesture_shooting.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: gesture_shooting.zip